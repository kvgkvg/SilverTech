version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  http: ^1.2.0
  flutter_tts: ^4.0.0
  sherpa_onnx: ^1.12.0
