openapi: 3.0.3
info:
  title: SilverTech MVP API
  version: 0.1.0
  description: API contract for template retrieval, Vietnamese query guidance, STT, submissions, and admin review.
paths:
  /api/vision/candidates:
    post:
      summary: Retrieve candidate templates for a detected or selected appliance context
      operationId: getVisionCandidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brand:
                  type: string
                appliance_type:
                  type: string
                brand_confidence:
                  type: number
                  format: float
              additionalProperties: false
      responses:
        "200":
          description: Candidate templates and metadata
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/TemplateSummary"
        "400":
          $ref: "#/components/responses/FriendlyError"
  /api/templates/{id}:
    get:
      summary: Return an official template with buttons
      operationId: getTemplate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template and button definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateDetail"
        "404":
          $ref: "#/components/responses/FriendlyError"
  /api/stt:
    post:
      summary: Convert Vietnamese audio to text
      operationId: transcribeVietnamese
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                locale:
                  type: string
                  default: vi-VN
      responses:
        "200":
          description: Vietnamese transcript
          content:
            application/json:
              schema:
                type: object
                required: [text, confidence]
                properties:
                  text:
                    type: string
                  confidence:
                    type: number
                    format: float
        "422":
          $ref: "#/components/responses/FriendlyError"
  /api/query:
    post:
      summary: Generate validated appliance guidance steps for a matched template
      operationId: createGuidance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template_id, user_query_text]
              properties:
                template_id:
                  type: string
                user_query_text:
                  type: string
                stt_metadata:
                  type: object
                  additionalProperties: true
              additionalProperties: false
      responses:
        "200":
          description: Validated guidance output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuidanceOutput"
        "409":
          description: Guidance could not be validated against known buttons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/submissions:
    post:
      summary: Submit a proposed template image and button labels
      operationId: createSubmission
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [brand, appliance_type, image, proposed_labels_json]
              properties:
                brand:
                  type: string
                appliance_type:
                  type: string
                image:
                  type: string
                  format: binary
                proposed_labels_json:
                  type: string
      responses:
        "201":
          description: Submission created and pending review
          content:
            application/json:
              schema:
                type: object
                required: [submission_id, status]
                properties:
                  submission_id:
                    type: string
                  status:
                    type: string
                    enum: [pending]
        "400":
          $ref: "#/components/responses/FriendlyError"
  /api/admin/submissions/{id}/review:
    post:
      summary: Accept, edit, or reject a submitted template
      operationId: reviewSubmission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [accept, edit, reject]
                reviewer_note:
                  type: string
                edited_template:
                  $ref: "#/components/schemas/TemplateEdit"
              additionalProperties: false
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                required: [submission_id, status]
                properties:
                  submission_id:
                    type: string
                  status:
                    type: string
                    enum: [accepted, rejected]
                  template_id:
                    type: string
        "400":
          $ref: "#/components/responses/FriendlyError"
components:
  responses:
    FriendlyError:
      description: Friendly Vietnamese recovery instruction
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [message_vi, recovery_action]
      properties:
        message_vi:
          type: string
        recovery_action:
          type: string
          enum: [rescan, move_closer, reduce_glare, scan_wider, manual_select, type_query, try_again]
    TemplateSummary:
      type: object
      required: [id, brand, appliance_type, template_code, version, status, template_image_url]
      properties:
        id:
          type: string
        brand:
          type: string
        appliance_type:
          type: string
        template_code:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [official]
        template_image_url:
          type: string
        logo_bbox:
          $ref: "#/components/schemas/BBox"
        panel_bbox:
          $ref: "#/components/schemas/BBox"
        feature_descriptor_url:
          type: string
    TemplateDetail:
      allOf:
        - $ref: "#/components/schemas/TemplateSummary"
        - type: object
          required: [buttons]
          properties:
            buttons:
              type: array
              items:
                $ref: "#/components/schemas/Button"
    Button:
      type: object
      required: [button_id, label, vietnamese_name, function_description, bbox_template_coordinates, button_type]
      properties:
        button_id:
          type: string
        label:
          type: string
        vietnamese_name:
          type: string
        function_description:
          type: string
        bbox_template_coordinates:
          $ref: "#/components/schemas/BBox"
        polygon_template_coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Point"
        button_type:
          type: string
          enum: [physical, touch, dial, display, unknown]
    GuidanceOutput:
      type: object
      required: [intent, steps]
      properties:
        intent:
          type: string
        steps:
          type: array
          minItems: 1
          items:
            type: object
            required: [step_number, instruction_vi, button_id, expected_result]
            properties:
              step_number:
                type: integer
                minimum: 1
              instruction_vi:
                type: string
              button_id:
                type: string
              expected_result:
                type: string
              audio_url:
                type: string
                nullable: true
        safety_note:
          type: string
          nullable: true
    TemplateEdit:
      type: object
      properties:
        device:
          type: object
          additionalProperties: true
        template:
          type: object
          additionalProperties: true
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/Button"
    BBox:
      type: object
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
    Point:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number
